    simple-git-hooks: ^2.13.1
    tailwindcss: ^4.1.6
    tsdown: ^0.22.0
    tsx: ^4.21.0
    turbo: ^2.9.14
    typescript: ^6.0.2
    unplugin-vue: ^7.1.1
    vite: ^7.3.2
