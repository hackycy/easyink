packages:
  - playground
  - docs
  - packages/*
  - packages/materials/*
  - examples/*
catalog:
  mutative: ^1.3.0
catalogMode: prefer

catalogs:
  cli:
    '@antfu/eslint-config': ^6.2.0
    '@antfu/ni': ^27.0.1
    '@tailwindcss/postcss': ^4.1.6
    '@tsdown/css': ^0.21.7
    '@vitejs/plugin-vue': ^6.0.5
    autoprefixer: ^10.4.20
    bumpp: ^10.3.1
    eslint: ^9.39.1
    lint-staged: ^16.2.6
    postcss: ^8.5.1
    publint: ^0.3.17
    sass-embedded: ^1.98.0
    simple-git-hooks: ^2.13.1
    tailwindcss: ^4.1.6
    tsdown: ^0.21.7
    tsx: ^4.20.6
    turbo: ^2.8.21
    typescript: ^6.0.2
    unplugin-vue: ^7.1.1
    vite: ^7.2.1
    vue-tsc: ^3.2.6
  framework:
    jsbarcode: ^3.12.3
    lucide-static: ^1.0.0
    lucide-vue-next: ^1.0.0
    qrcode-generator: ^2.0.4
    vue: ^3.5.0
  inlined:
    '@antfu/utils': ^9.3.0
    lodash-es: ^4.17.21
  testing:
    happy-dom: ^20.8.9
    tinyexec: ^1.0.2
    vitest: ^4.0.7
    vitest-package-exports: ^0.1.1
    yaml: ^2.8.1
  types:
    '@types/lodash-es': ^4.17.12
    '@types/node': ^24.10.0
ignoreWorkspaceRootCheck: true

onlyBuiltDependencies:
  - '@parcel/watcher'
  - esbuild
  - simple-git-hooks
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - chokidar@4.0.3
