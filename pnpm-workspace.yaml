catalogMode: prefer
ignoreWorkspaceRootCheck: true
shellEmulator: true
trustPolicy: no-downgrade

packages:
  - playground
  - docs
  - packages/*
  - examples/*

catalogs:
  cli:
    '@antfu/eslint-config': ^6.2.0
    '@antfu/ni': ^27.0.1
    '@vitejs/plugin-vue': ^6.0.5
    bumpp: ^10.3.1
    eslint: ^9.39.1
    lint-staged: ^16.2.6
    publint: ^0.3.17
    simple-git-hooks: ^2.13.1
    tsdown: ^0.16.0
    tsx: ^4.20.6
    typescript: ^5.9.3
    vite: ^7.2.1
  framework:
    vue: ^3.5.0
  inlined:
    '@antfu/utils': ^9.3.0
    lodash-es: ^4.17.21
  testing:
    happy-dom: ^17.4.4
    tinyexec: ^1.0.2
    vitest: ^4.0.7
    vitest-package-exports: ^0.1.1
    yaml: ^2.8.1
  types:
    '@types/lodash-es': ^4.17.12
    '@types/node': ^24.10.0

onlyBuiltDependencies:
  - esbuild
  - simple-git-hooks
