packages:
  - playground
  - docs
  - packages/*
  - packages/materials/*
  - examples/*
catalogMode: prefer

catalogs:
  cli:
    '@antfu/eslint-config': ^8.2.0
    '@changesets/cli': ^2.31.0
    '@tailwindcss/postcss': ^4.1.6
    '@tailwindcss/vite': ^4.2.4
    '@tsdown/css': ^0.21.10
    '@vitejs/plugin-vue': ^6.0.6
    autoprefixer: ^10.4.20
    bumpp: ^10.3.1
    eslint: ^10.2.1
    lint-staged: ^16.2.6
    postcss: ^8.5.1
    publint: ^0.3.17
    sass-embedded: ^1.98.0
    simple-git-hooks: ^2.13.1
    tailwindcss: ^4.1.6
    tsdown: ^0.21.10
    tsx: ^4.21.0
    turbo: ^2.8.21
    typescript: ^6.0.2
    unplugin-vue: ^7.1.1
    vite: ^7.3.2
    vue-tsc: ^3.2.6
  framework:
    '@anthropic-ai/sdk': ^0.91.0
    '@modelcontextprotocol/sdk': ^1.29.0
    '@vueuse/core': ^14.2.1
    dotenv: ^17.2.5
    jsbarcode: ^3.12.3
    lucide-static: ^1.0.0
    lucide-vue-next: ^1.0.0
    mutative: ^1.3.0
    openai: ^6.34.0
    qrcode-generator: ^2.0.4
    vue: ^3.5.0
    zod: ^3.24.0
  inlined:
    '@antfu/utils': ^9.3.0
    lodash-es: ^4.18.1
  testing:
    happy-dom: ^20.8.9
    tinyexec: ^1.0.2
    vitest: ^4.0.7
    vitest-package-exports: ^0.1.1
    yaml: ^2.8.1
  types:
    '@types/lodash-es': ^4.17.12
    '@types/node': ^24.10.0
ignoreWorkspaceRootCheck: true

onlyBuiltDependencies:
  - '@parcel/watcher'
  - esbuild
  - simple-git-hooks
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - chokidar@4.0.3
