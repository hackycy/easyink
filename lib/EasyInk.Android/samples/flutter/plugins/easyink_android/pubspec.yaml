name: easyink_android
description: Flutter MethodChannel bridge for the EasyInk Android render SDK.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.10.7
  flutter: '>=3.38.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.easyink.flutter
        pluginClass: EasyInkAndroidPlugin
