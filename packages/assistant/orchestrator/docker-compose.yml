services:
  assistant-orchestrator:
    image: easyink-assistant-orchestrator:local
    build:
      context: ../../..
      dockerfile: packages/assistant/orchestrator/Dockerfile
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    ports:
      - '3010:3010'
    environment:
      EASYINK_ASSISTANT_HTTP_HOST: 0.0.0.0
      EASYINK_ASSISTANT_HTTP_PORT: 3010
      EASYINK_ASSISTANT_CORS_ORIGIN: ${EASYINK_ASSISTANT_CORS_ORIGIN:-*}
      EASYINK_ASSISTANT_STORE_DIR: /var/lib/easyink-assistant
      EASYINK_ASSISTANT_STORE_FILE: assistant-store.json
    volumes:
      - assistant-data:/var/lib/easyink-assistant
    restart: unless-stopped

volumes:
  assistant-data:
