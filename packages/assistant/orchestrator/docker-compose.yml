services:
  assistant-orchestrator:
    image: easyink-assistant-orchestrator:local
    build:
      context: ../../..
      dockerfile: packages/assistant/orchestrator/Dockerfile
    ports:
      - '${EASYINK_ASSISTANT_HTTP_PORT:-3010}:3010'
    environment:
      EASYINK_ASSISTANT_HTTP_HOST: 0.0.0.0
      EASYINK_ASSISTANT_HTTP_PORT: 3010
      EASYINK_ASSISTANT_STORE_DIR: /var/lib/easyink-assistant
      EASYINK_ASSISTANT_STORE_FILE: ${EASYINK_ASSISTANT_STORE_FILE:-assistant-store.json}
      EASYINK_ASSISTANT_LLM_PROVIDER: ${EASYINK_ASSISTANT_LLM_PROVIDER:-}
      EASYINK_ASSISTANT_LLM_MODEL: ${EASYINK_ASSISTANT_LLM_MODEL:-}
      EASYINK_ASSISTANT_LLM_BASE_URL: ${EASYINK_ASSISTANT_LLM_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - assistant-data:/var/lib/easyink-assistant
    restart: unless-stopped

volumes:
  assistant-data:
