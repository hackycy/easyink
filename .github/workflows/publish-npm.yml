name: Publish npm Packages

on:
  push:
    tags:
      - 'npm-v*'

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      published_packages: ${{ steps.changesets.outputs.publishedPackages }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
          scope: '@easyink'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      # Each published package must be manually published once, then granted publish
      # access for the configured NPM_TOKEN on npmjs.com.
      - name: Publish packages to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset:publish
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_ACCESS: public
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Write workflow summary
        shell: bash
        run: |
          {
            echo "npm package release workflow completed."
            echo
            echo "- Published: ${{ steps.changesets.outputs.published }}"
            echo "- Published packages: ${{ steps.changesets.outputs.publishedPackages }}"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-pages:
    needs:
      - release
    if: ${{ needs.release.result == 'success' && needs.release.outputs.published == 'true' }}
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/deploy-pages.yml
    secrets:
      EASYINK_ASSISTANT_SERVER_URL: ${{ secrets.EASYINK_ASSISTANT_SERVER_URL }}

  publish-orchestrator-image:
    needs:
      - release
    if: ${{ needs.release.result == 'success' && needs.release.outputs.published == 'true' && contains(needs.release.outputs.published_packages, '@easyink/assistant-orchestrator') }}
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/publish-orchestrator-image.yml
    with:
      push_latest: true
