name: Publish npm Packages

on:
  push:
    tags:
      - 'npm-v*'

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      published_packages: ${{ steps.changesets.outputs.publishedPackages }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
          scope: '@easyink'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      # Each published package must be manually published once, then granted publish
      # access for the configured NPM_TOKEN on npmjs.com.
      - name: Publish packages to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset:publish
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_ACCESS: public
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Write workflow summary
        shell: bash
        run: |
          {
            echo "npm package release workflow completed."
            echo
            echo "- Published: ${{ steps.changesets.outputs.published }}"
            echo "- Published packages: ${{ steps.changesets.outputs.publishedPackages }}"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-mcp-docker:
    needs: release
    if: ${{ needs.release.outputs.published == 'true' && contains(needs.release.outputs.published_packages, '@easyink/mcp-server') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read mcp-server version
        id: mcp_server_version
        shell: bash
        run: |
          version=$(node --input-type=module -e "import fs from 'node:fs'; const pkg = JSON.parse(fs.readFileSync('./packages/mcp-server/package.json', 'utf8')); console.log(pkg.version)")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Resolve container image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/easyink-mcp-server" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ steps.mcp_server_version.outputs.version }}
            type=sha

      - name: Build and publish mcp-server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/mcp-server/Dockerfile
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}

      - name: Write workflow summary
        shell: bash
        run: |
          {
            echo "Published mcp-server Docker image."
            echo
            echo "- Version: ${{ steps.mcp_server_version.outputs.version }}"
            echo "- Image: ${{ steps.image.outputs.name }}"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-pages:
    needs:
      - release
      - publish-mcp-docker
    if: ${{ always() && needs.release.result == 'success' && needs.release.outputs.published == 'true' && (needs.publish-mcp-docker.result == 'success' || needs.publish-mcp-docker.result == 'skipped') }}
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/deploy-pages.yml
