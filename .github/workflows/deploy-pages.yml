name: Deploy GitHub Pages

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare build metadata
        run: |
          echo "VITE_BUILD_SHA=$GITHUB_SHA" >> "$GITHUB_ENV"
          echo "VITE_BUILD_REF_NAME=$GITHUB_REF_NAME" >> "$GITHUB_ENV"
          echo "VITE_BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Lint
        run: pnpm lint

      - name: Build packages
        run: pnpm build

      - name: Build playground
        run: pnpm --filter @easyink/playground build

      - name: Build docs
        env:
          EASYINK_DOCS_BASE: /easyink/docs/
        run: pnpm docs:build

      - name: Typecheck
        run: pnpm typecheck

      - name: Assemble Pages artifact
        shell: bash
        run: |
          rm -rf .pages
          mkdir -p .pages/docs
          cp -R playground/dist/. .pages/
          cp -R docs/.vitepress/dist/. .pages/docs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
