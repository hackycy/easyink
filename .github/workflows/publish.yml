name: Publish

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-context:
    runs-on: ubuntu-latest
    outputs:
      mcp_server_version: ${{ steps.mcp_server_version.outputs.version }}
      should_publish_docker: ${{ steps.docker_release.outputs.should_publish }}
      image_name: ${{ steps.image.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Read mcp-server version
        id: mcp_server_version
        shell: bash
        run: |
          version=$(node --input-type=module -e "import fs from 'node:fs'; const pkg = JSON.parse(fs.readFileSync('./packages/mcp-server/package.json', 'utf8')); console.log(pkg.version)")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Detect docker release
        id: docker_release
        env:
          CURRENT_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          current_version='${{ steps.mcp_server_version.outputs.version }}'
          previous_tag=$(git for-each-ref --sort=-creatordate --format='%(refname:strip=2)' refs/tags/v* | grep -Fvx "$CURRENT_TAG" | head -n 1 || true)
          previous_version=''
          should_publish=true

          if [ -n "$previous_tag" ]; then
            previous_package_json=$(git show "$previous_tag:packages/mcp-server/package.json" 2>/dev/null || true)

            if [ -n "$previous_package_json" ]; then
              previous_version=$(printf '%s' "$previous_package_json" | node --input-type=module -e "import fs from 'node:fs'; const pkg = JSON.parse(fs.readFileSync(0, 'utf8')); process.stdout.write(pkg.version ?? '')")

              if [ "$current_version" = "$previous_version" ]; then
                should_publish=false
              fi
            fi
          fi

          echo "previous_tag=$previous_tag" >> "$GITHUB_OUTPUT"
          echo "previous_version=$previous_version" >> "$GITHUB_OUTPUT"
          echo "should_publish=$should_publish" >> "$GITHUB_OUTPUT"

      - name: Resolve container image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/easyink-mcp-server" >> "$GITHUB_OUTPUT"

  build-dotnet-release-assets:
    needs:
      - release-context
      - build-render-release-assets
    permissions:
      contents: read
    uses: ./.github/workflows/build-easyink-dotnet.yml
    with:
      run_tests: true
      build_portable: true
      build_installer: true
      upload_engine_sdk: true
      render_host_artifact_name: ${{ needs.build-render-release-assets.outputs.host_artifact_name }}

  build-render-release-assets:
    needs: release-context
    permissions:
      contents: read
    uses: ./.github/workflows/build-easyink-render.yml
    with:
      run_tests: true
      platforms: all

  publish-npm:
    needs: release-context
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
          scope: '@easyink'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      # Each published package must be manually published once, then granted publish
      # access for the configured NPM_TOKEN on npmjs.com.
      - name: Publish packages to npm
        uses: changesets/action@v1
        with:
          publish: pnpm changeset:publish
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_ACCESS: public
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    needs: release-context
    if: needs.release-context.outputs.should_publish_docker == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.release-context.outputs.image_name }}
          tags: |
            type=raw,value=${{ needs.release-context.outputs.mcp_server_version }}
            type=sha

      - name: Build and publish mcp-server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/mcp-server/Dockerfile
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}

  publish-release:
    needs:
      - release-context
      - build-dotnet-release-assets
      - build-render-release-assets
      - publish-npm
      - publish-docker
    if: ${{ always() && needs.release-context.result == 'success' && needs.build-dotnet-release-assets.result == 'success' && needs.build-render-release-assets.result == 'success' && needs.publish-npm.result == 'success' && (needs.publish-docker.result == 'success' || needs.publish-docker.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download EasyInk.Engine SDK artifact
        if: ${{ needs.build-dotnet-release-assets.outputs.engine_artifact_name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-dotnet-release-assets.outputs.engine_artifact_name }}
          path: release-assets

      - name: Download portable artifact
        if: ${{ needs.build-dotnet-release-assets.outputs.portable_artifact_name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-dotnet-release-assets.outputs.portable_artifact_name }}
          path: release-assets

      - name: Download installer artifact
        if: ${{ needs.build-dotnet-release-assets.outputs.installer_artifact_name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-dotnet-release-assets.outputs.installer_artifact_name }}
          path: release-assets

      - name: Download Render host artifact
        if: ${{ needs.build-render-release-assets.outputs.host_artifact_name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-render-release-assets.outputs.host_artifact_name }}
          path: release-assets

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: release-assets/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Write workflow summary
        shell: bash
        run: |
          {
            echo "Published GitHub Release for ${{ github.ref_name }}."
            echo
            echo "- Tag: ${{ github.ref_name }}"
            echo "- EasyInk.Printer version: ${{ needs.build-dotnet-release-assets.outputs.printer_version }}"
            echo "- EasyInk.Net artifact suffix: ${{ needs.build-dotnet-release-assets.outputs.artifact_suffix }}"
            echo "- EasyInk.Render version: ${{ needs.build-render-release-assets.outputs.render_version }}"
            echo "- EasyInk.Render artifact suffix: ${{ needs.build-render-release-assets.outputs.artifact_suffix }}"
            echo "- Docker image published: ${{ needs.release-context.outputs.should_publish_docker }}"
            echo "- Release assets directory: release-assets"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-pages:
    needs: publish-release
    if: ${{ needs.publish-release.result == 'success' }}
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/deploy-pages.yml
