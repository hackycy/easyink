name: Build EasyInk.Net

on:
  workflow_call:
    inputs:
      run_tests:
        description: Run EasyInk.Net test projects before packaging
        type: boolean
        default: true
      build_portable:
        description: Build the portable zip package
        type: boolean
        default: true
      build_installer:
        description: Build the Inno Setup installer
        type: boolean
        default: true
      upload_engine_sdk:
        description: Upload a standalone EasyInk.Engine SDK package for external consumers
        type: boolean
        default: true
    outputs:
      printer_version:
        description: EasyInk.Printer package version
        value: ${{ jobs.build.outputs.printer_version }}
      assembly_version:
        description: EasyInk.Printer assembly version
        value: ${{ jobs.build.outputs.assembly_version }}
      artifact_suffix:
        description: Artifact suffix shared by all EasyInk.Net packages
        value: ${{ jobs.build.outputs.artifact_suffix }}
      engine_artifact_name:
        description: Uploaded EasyInk.Engine SDK artifact name
        value: ${{ jobs.build.outputs.engine_artifact_name }}
      portable_artifact_name:
        description: Uploaded portable package artifact name
        value: ${{ jobs.build.outputs.portable_artifact_name }}
      installer_artifact_name:
        description: Uploaded installer package artifact name
        value: ${{ jobs.build.outputs.installer_artifact_name }}
  workflow_dispatch:
    inputs:
      run_tests:
        description: Run EasyInk.Net test projects before packaging
        type: boolean
        default: true
      build_portable:
        description: Build the portable zip package
        type: boolean
        default: true
      build_installer:
        description: Build the Inno Setup installer
        type: boolean
        default: true
      upload_engine_sdk:
        description: Upload a standalone EasyInk.Engine SDK package for external consumers
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: build-easyink-dotnet-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-2022
    outputs:
      printer_version: ${{ steps.version.outputs.printer_version }}
      assembly_version: ${{ steps.version.outputs.assembly_version }}
      artifact_suffix: ${{ steps.version.outputs.artifact_suffix }}
      engine_artifact_name: ${{ steps.artifact_names.outputs.engine_artifact_name }}
      portable_artifact_name: ${{ steps.artifact_names.outputs.portable_artifact_name }}
      installer_artifact_name: ${{ steps.artifact_names.outputs.installer_artifact_name }}

    steps:
      - name: Validate inputs
        shell: pwsh
        env:
          BUILD_PORTABLE: ${{ inputs.build_portable }}
          BUILD_INSTALLER: ${{ inputs.build_installer }}
          UPLOAD_ENGINE_SDK: ${{ inputs.upload_engine_sdk }}
        run: |
          if ($env:BUILD_PORTABLE -ne 'true' -and $env:BUILD_INSTALLER -ne 'true' -and $env:UPLOAD_ENGINE_SDK -ne 'true') {
            throw 'At least one artifact output must be enabled.'
          }

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Read packaging version
        id: version
        shell: pwsh
        run: |
          [xml]$project = Get-Content 'lib/EasyInk.Net/EasyInk.Printer/src/EasyInk.Printer.csproj'
          $version = ($project.Project.PropertyGroup | Where-Object { $_.Version } | Select-Object -First 1).Version

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw 'Version not found in EasyInk.Printer.csproj'
          }

          $normalizedVersion = $version.Split('-', 2)[0].Split('+', 2)[0]
          if ($normalizedVersion -notmatch '^\d+\.\d+\.\d+$') {
            throw "Unsupported version format for assembly metadata: $version"
          }

          $assemblyVersion = "$normalizedVersion.0"
          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          $suffix = "v$version-$shortSha"
          $informationalVersion = "$version+$shortSha"

          "printer_version=$version" >> $env:GITHUB_OUTPUT
          "assembly_version=$assemblyVersion" >> $env:GITHUB_OUTPUT
          "informational_version=$informationalVersion" >> $env:GITHUB_OUTPUT
          "artifact_suffix=$suffix" >> $env:GITHUB_OUTPUT

      - name: Resolve artifact names
        id: artifact_names
        shell: pwsh
        env:
          BUILD_PORTABLE: ${{ inputs.build_portable }}
          BUILD_INSTALLER: ${{ inputs.build_installer }}
          UPLOAD_ENGINE_SDK: ${{ inputs.upload_engine_sdk }}
          ARTIFACT_SUFFIX: ${{ steps.version.outputs.artifact_suffix }}
        run: |
          if ($env:UPLOAD_ENGINE_SDK -eq 'true') {
            "engine_artifact_name=easyink-engine-sdk-$env:ARTIFACT_SUFFIX" >> $env:GITHUB_OUTPUT
          }
          else {
            "engine_artifact_name=" >> $env:GITHUB_OUTPUT
          }

          if ($env:BUILD_PORTABLE -eq 'true') {
            "portable_artifact_name=easyink-printer-portable-$env:ARTIFACT_SUFFIX" >> $env:GITHUB_OUTPUT
          }
          else {
            "portable_artifact_name=" >> $env:GITHUB_OUTPUT
          }

          if ($env:BUILD_INSTALLER -eq 'true') {
            "installer_artifact_name=easyink-printer-installer-$env:ARTIFACT_SUFFIX" >> $env:GITHUB_OUTPUT
          }
          else {
            "installer_artifact_name=" >> $env:GITHUB_OUTPUT
          }

      - name: Restore solution
        run: dotnet restore lib/EasyInk.Net/EasyInk.Net.sln

      - name: Download SumatraPDF
        shell: pwsh
        run: ./lib/EasyInk.Net/EasyInk.Printer/tools/download-sumatra.ps1

      - name: Build solution
        run: dotnet build lib/EasyInk.Net/EasyInk.Net.sln -c Release --no-restore --nologo /p:Version=${{ steps.version.outputs.printer_version }} /p:AssemblyVersion=${{ steps.version.outputs.assembly_version }} /p:FileVersion=${{ steps.version.outputs.assembly_version }} /p:InformationalVersion=${{ steps.version.outputs.informational_version }}

      - name: Test EasyInk.Engine
        if: ${{ inputs.run_tests }}
        run: dotnet test lib/EasyInk.Net/EasyInk.Engine/tests/EasyInk.Engine.Tests.csproj -c Release --no-build --nologo

      - name: Test EasyInk.Printer
        if: ${{ inputs.run_tests }}
        run: dotnet test lib/EasyInk.Net/EasyInk.Printer/tests/EasyInk.Printer.Tests.csproj -c Release --no-build --nologo

      - name: Publish EasyInk.Printer
        run: dotnet publish lib/EasyInk.Net/EasyInk.Printer/src/EasyInk.Printer.csproj -c Release --no-build --nologo /p:Version=${{ steps.version.outputs.printer_version }} /p:AssemblyVersion=${{ steps.version.outputs.assembly_version }} /p:FileVersion=${{ steps.version.outputs.assembly_version }} /p:InformationalVersion=${{ steps.version.outputs.informational_version }}

      - name: Prepare artifact directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path 'lib/EasyInk.Net/.artifacts' | Out-Null

      - name: Build EasyInk.Engine SDK package
        if: ${{ inputs.upload_engine_sdk }}
        shell: pwsh
        run: |
          $engineOutputDir = 'lib/EasyInk.Net/EasyInk.Engine/src/bin/Release/net48'
          $stagingDir = "lib/EasyInk.Net/.artifacts/EasyInkEngine-SDK-${{ steps.version.outputs.artifact_suffix }}"
          $zipPath = "$stagingDir.zip"

          if (!(Test-Path $engineOutputDir)) {
            throw "Engine output not found: $engineOutputDir"
          }

          if (Test-Path $stagingDir) {
            Remove-Item $stagingDir -Recurse -Force
          }

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null
          Copy-Item "$engineOutputDir/*" $stagingDir -Recurse -Force
          Copy-Item 'lib/EasyInk.Net/EasyInk.Engine/README.md' "$stagingDir/README.md" -Force
          Copy-Item 'LICENSE' "$stagingDir/LICENSE" -Force

          Compress-Archive -Path "$stagingDir/*" -DestinationPath $zipPath -Force

      - name: Build portable package
        if: ${{ inputs.build_portable }}
        shell: pwsh
        run: |
          $publishDir = 'lib/EasyInk.Net/EasyInk.Printer/src/bin/Release/net48/publish'
          $target = "lib/EasyInk.Net/.artifacts/EasyInkPrinter-Portable-${{ steps.version.outputs.artifact_suffix }}.zip"

          if (Test-Path $target) {
            Remove-Item $target -Force
          }

          Compress-Archive -Path "$publishDir/*" -DestinationPath $target -Force

      - name: Install Inno Setup
        if: ${{ inputs.build_installer }}
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer package
        if: ${{ inputs.build_installer }}
        shell: pwsh
        run: |
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' "/DAppVersion=${{ steps.version.outputs.printer_version }}" 'lib/EasyInk.Net/EasyInk.Printer/installer.iss'

          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup compilation failed with exit code $LASTEXITCODE"
          }

          $source = 'lib/EasyInk.Net/EasyInk.Printer/output/EasyInkPrinter-Setup.exe'
          $target = "lib/EasyInk.Net/.artifacts/EasyInkPrinter-Setup-${{ steps.version.outputs.artifact_suffix }}.exe"

          if (!(Test-Path $source)) {
            throw "Installer output not found: $source"
          }

          Copy-Item $source $target -Force

      - name: Upload EasyInk.Engine SDK artifact
        if: ${{ inputs.upload_engine_sdk }}
        uses: actions/upload-artifact@v4
        with:
          name: easyink-engine-sdk-${{ steps.version.outputs.artifact_suffix }}
          path: lib/EasyInk.Net/.artifacts/EasyInkEngine-SDK-${{ steps.version.outputs.artifact_suffix }}.zip
          if-no-files-found: error

      - name: Upload portable artifact
        if: ${{ inputs.build_portable }}
        uses: actions/upload-artifact@v4
        with:
          name: easyink-printer-portable-${{ steps.version.outputs.artifact_suffix }}
          path: lib/EasyInk.Net/.artifacts/EasyInkPrinter-Portable-${{ steps.version.outputs.artifact_suffix }}.zip
          if-no-files-found: error

      - name: Upload installer artifact
        if: ${{ inputs.build_installer }}
        uses: actions/upload-artifact@v4
        with:
          name: easyink-printer-installer-${{ steps.version.outputs.artifact_suffix }}
          path: lib/EasyInk.Net/.artifacts/EasyInkPrinter-Setup-${{ steps.version.outputs.artifact_suffix }}.exe
          if-no-files-found: error

      - name: Write workflow summary
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "Built EasyInk.Net on Windows."
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Version: ${{ steps.version.outputs.printer_version }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Assembly/File version: ${{ steps.version.outputs.assembly_version }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Artifact suffix: ${{ steps.version.outputs.artifact_suffix }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Engine SDK uploaded: ${{ inputs.upload_engine_sdk }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Portable zip uploaded: ${{ inputs.build_portable }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Installer uploaded: ${{ inputs.build_installer }}"
